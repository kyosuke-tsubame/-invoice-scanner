<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>納品書スキャナー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
  background: #f0ede8;
  min-height: 100vh;
  color: #1a1a1a;
}
header {
  background: #1c2340;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 { color: #fff; font-size: 16px; font-weight: 600; }
.container { max-width: 640px; margin: 0 auto; padding: 20px 16px 100px; }

.card {
  background: #fff;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
  border: 1px solid #e4e0da;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  color: #999;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.btn {
  padding: 11px 20px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-dark { background: #1c2340; color: #fff; }
.btn-green { background: #1d9e75; color: #fff; }
.btn-outline { background: #fff; color: #1c2340; border: 1.5px solid #1c2340; }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-full { width: 100%; padding: 14px; font-size: 15px; }

.drop-area {
  border: 2px dashed #ccc;
  border-radius: 14px;
  padding: 32px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: #fafafa;
}
.drop-area:hover, .drop-area.drag {
  background: #eef2ff;
  border-color: #3b6fd4;
}
.drop-icon { font-size: 40px; margin-bottom: 10px; }
.drop-text { font-size: 13px; color: #888; margin-bottom: 14px; line-height: 1.6; }

.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  margin-top: 14px;
}
.preview-card {
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid #e4e0da;
  position: relative;
  background: #fff;
}
.preview-card img { width: 100%; height: 80px; object-fit: cover; display: block; }
.preview-name {
  font-size: 10px; color: #888; padding: 4px 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.badge {
  position: absolute; top: 4px; right: 4px;
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 20px;
}
.badge-wait { background: #f1f5f9; color: #64748b; }
.badge-loading { background: #dbeafe; color: #1e40af; }
.badge-done { background: #dcfce7; color: #166534; }
.badge-error { background: #fee2e2; color: #991b1b; }
.remove-btn {
  position: absolute; top: 4px; left: 4px;
  background: rgba(0,0,0,0.5); border: none;
  border-radius: 50%; width: 20px; height: 20px;
  color: #fff; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}

.progress-wrap { margin: 12px 0 4px; }
.progress-bar { height: 4px; background: #e4e0da; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: #3b6fd4; transition: width 0.3s ease; border-radius: 4px; }
.progress-label { font-size: 11px; color: #888; margin-top: 4px; text-align: right; }

.actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

.result-card {
  background: #fff;
  border: 1px solid #e4e0da;
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
}
.result-header {
  padding: 12px 16px;
  background: #f8f7f4;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid #e4e0da;
  gap: 8px;
}
.result-header-left { flex: 1; min-width: 0; }
.result-filename { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-total { font-weight: 700; font-size: 16px; color: #1d9e75; white-space: nowrap; }

.result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.result-table th {
  padding: 8px 10px; background: #f8f7f4;
  color: #888; font-weight: 600; text-align: left;
  border-bottom: 1px solid #e4e0da;
}
.result-table td { padding: 8px 10px; border-bottom: 1px solid #f0ede8; color: #1a1a1a; }
.result-table tr:last-child td { border-bottom: none; }
.result-table .num { text-align: right; }
.error-row {
  padding: 12px 16px; background: #fff5f5; border-radius: 10px;
  font-size: 13px; color: #991b1b; margin-bottom: 10px;
  border: 1px solid #fecaca;
}
.results-title {
  font-size: 12px; font-weight: 700; color: #888;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin: 16px 0 10px;
}

/* 店舗選択 */
.store-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.store-btn {
  padding: 14px 10px;
  border: 2px solid #e4e0da;
  border-radius: 12px;
  background: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  color: #1a1a1a;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.store-btn:hover { border-color: #3b6fd4; background: #eef2ff; }
.store-btn.selected {
  border-color: #1c2340;
  background: #1c2340;
  color: #fff;
}
.store-selected-label {
  font-size: 13px;
  color: #1d9e75;
  font-weight: 600;
  margin-top: 10px;
}

/* 確認画面 */
.confirm-body { padding: 14px 16px; }
.confirm-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.confirm-label {
  font-size: 12px;
  color: #888;
  font-weight: 600;
  width: 46px;
  flex-shrink: 0;
}
.confirm-field {
  flex: 1;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 14px;
  font-family: inherit;
  background: #fafafa;
  outline: none;
  transition: border-color 0.15s;
}
.confirm-field:focus { border-color: #3b6fd4; background: #fff; }
select.confirm-field { cursor: pointer; }
.split-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  background: #f8f7f4;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}
.split-fields { flex: 1; }
.split-fields .confirm-row:last-child { margin-bottom: 0; }
.remove-split-btn {
  background: none;
  border: none;
  color: #bbb;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 6px;
  line-height: 1;
  margin-top: 2px;
}
.remove-split-btn:hover { color: #e53e3e; }
.add-split-btn {
  width: 100%;
  background: none;
  border: 1.5px dashed #ccc;
  border-radius: 8px;
  padding: 9px;
  font-size: 13px;
  color: #999;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 12px;
  transition: all 0.15s;
}
.add-split-btn:hover { border-color: #3b6fd4; color: #3b6fd4; }
.split-divider { border: none; border-top: 1px solid #f0ede8; margin: 12px 0; }
.split-check {
  font-size: 12px;
  padding: 7px 10px;
  border-radius: 7px;
  margin-bottom: 10px;
  font-weight: 600;
}
.split-check-ok { background: #dcfce7; color: #166534; }
.split-check-ng { background: #fee2e2; color: #991b1b; }
.items-toggle {
  font-size: 12px;
  color: #aaa;
  cursor: pointer;
  margin-top: 4px;
  list-style: none;
}
.items-toggle::marker { display: none; }
</style>
</head>
<body>

<header>
  <span style="font-size:22px">📋</span>
  <h1>納品書スキャナー</h1>
</header>

<div class="container">

  <!-- 店舗選択 -->
  <div class="card" id="storeCard">
    <div class="card-title">店舗を選択</div>
    <div class="store-grid">
      <button class="store-btn" onclick="selectStore('本店')">本店</button>
      <button class="store-btn" onclick="selectStore('KADODE店')">KADODE店</button>
      <button class="store-btn" onclick="selectStore('空港店')">空港店</button>
      <button class="store-btn" onclick="selectStore('静岡紺屋町店')">静岡紺屋町店</button>
      <button class="store-btn" onclick="selectStore('セントラル')">セントラル</button>
    </div>
    <div class="store-selected-label" id="storeLabel" style="display:none"></div>
  </div>

  <!-- アップロード -->
  <div class="card" id="uploadCard">
    <div class="card-title">納品書をアップロード</div>
    <div class="drop-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">📷</div>
      <p class="drop-text">納品書の写真をここにドロップ<br>またはタップして選択</p>
      <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
        写真を選択
      </button>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="addFiles(this.files)">
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>

    <div class="actions" id="actionsArea" style="display:none">
      <button class="btn btn-dark" id="scanBtn" onclick="scanAll()">読み取り開始</button>
    </div>
  </div>

  <!-- 確認画面 / 結果エリア -->
  <div id="resultsArea"></div>

</div>

<script>
const STORES = ['本店', 'KADODE店', '空港店', '静岡紺屋町店', 'セントラル'];
const API_KEY = 'AIzaSyA-IVuYvdvQ8UXjb57PWuF9bN1KYixLWHc';

let files = [];
let results = {};
let selectedStore = '';
let confirmData = [];

// ── 店舗選択 ──────────────────────────────
function selectStore(name) {
  selectedStore = name;
  document.querySelectorAll('.store-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent === name);
  });
  const label = document.getElementById('storeLabel');
  label.textContent = '✓ ' + name + ' を選択中';
  label.style.display = '';
}

// ── ファイル操作 ──────────────────────────
function addFiles(newFiles) {
  Array.from(newFiles).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    if (files.find(x => x.name === f.name && x.size === f.size)) return;
    files.push(f);
  });
  document.getElementById('fileInput').value = '';
  renderPreviews();
  updateActions();
}

function removeFile(idx) {
  files.splice(idx, 1);
  const newR = {};
  Object.keys(results).forEach(k => {
    const ki = parseInt(k);
    if (ki < idx) newR[ki] = results[k];
    else if (ki > idx) newR[ki - 1] = results[k];
  });
  results = newR;
  renderPreviews();
  updateActions();
}

function updateActions() {
  document.getElementById('actionsArea').style.display = files.length ? '' : 'none';
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  files.forEach((f, i) => {
    const r = results[i];
    const status = r ? r.status : 'idle';
    const url = URL.createObjectURL(f);
    const badgeMap = { loading: 'badge-loading', done: 'badge-done', error: 'badge-error' };
    const labelMap = { loading: '読取中', done: '完了', error: 'エラー' };
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `
      <img src="${url}" alt="${f.name}">
      <div class="preview-name">${f.name}</div>
      ${status !== 'idle' ? `<div class="badge ${badgeMap[status] || 'badge-wait'}">${labelMap[status] || ''}</div>` : ''}
      <button class="remove-btn" onclick="removeFile(${i})" title="削除">×</button>
    `;
    grid.appendChild(card);
  });
}

// ── OCR ──────────────────────────────────
async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function callVisionAPI(file) {
  const b64 = await fileToBase64(file);
  const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      requests: [{ image: { content: b64 }, features: [{ type: 'TEXT_DETECTION', maxResults: 1 }] }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  if (data.responses?.[0]?.error) throw new Error(data.responses[0].error.message);
  const text = data.responses?.[0]?.fullTextAnnotation?.text || '';
  if (!text) throw new Error('テキストを検出できませんでした');
  return text;
}

function parseInvoice(text, filename) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  const supplierMatch = text.match(/([^\n]+(?:株式会社|有限会社|合同会社|㈱|㈲)[^\n]*)/);
  const supplier = supplierMatch ? supplierMatch[1].trim().replace(/\s+/g, '') : '';

  const dateMatch = text.match(/(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
  const date = dateMatch
    ? `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`
    : '';

  const items = [];
  lines.forEach(line => {
    if (line.length < 3) return;
    const nums = [...line.matchAll(/[\d,，]+/g)].map(m => parseInt(m[0].replace(/[,，]/g, ''))).filter(n => !isNaN(n) && n > 0);
    if (nums.length < 2) return;
    const amount = nums[nums.length - 1];
    if (amount <= 0 || amount > 9999999) return;
    const qty = nums.length >= 3 ? nums[0] : 0;
    const unitMatch = line.match(/Kg|kg|KG|パック|バック|本|袋|個|枚|ケース|箱/);
    const unit = unitMatch ? unitMatch[0] : '';
    const name = line.replace(/[\d,，.\s　]+/g, ' ').replace(/Kg|kg|KG|パック|バック|本|袋|個|枚|ケース|箱/g, '').trim();
    if (name.length >= 2) {
      items.push({ name, qty, unit, amount });
    }
  });

  const totalMatch = text.match(/合計[金額]*\s*[\:：]?\s*([\d,，]+)/);
  const calcTotal = items.reduce((s, it) => s + it.amount, 0);
  const total = totalMatch ? parseInt(totalMatch[1].replace(/[,，]/g, '')) : calcTotal;

  return { filename, supplier, date, items, total };
}

async function scanAll() {
  if (!selectedStore) { alert('先に店舗を選択してください'); return; }
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('progressWrap').style.display = '';

  let done = 0;
  for (let i = 0; i < files.length; i++) {
    if (results[i]?.status === 'done') { done++; continue; }
    results[i] = { status: 'loading' };
    renderPreviews();
    try {
      const text = await callVisionAPI(files[i]);
      const data = parseInvoice(text, files[i].name);
      results[i] = { status: 'done', data };
    } catch (e) {
      results[i] = { status: 'error', error: e.message };
    }
    done++;
    const pct = Math.round((done / files.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${done} / ${files.length}`;
    renderPreviews();
  }

  document.getElementById('scanBtn').disabled = false;
  const doneCount = Object.values(results).filter(r => r?.status === 'done').length;
  if (doneCount > 0) {
    buildConfirmData();
    renderConfirm();
  }
}

// ── 確認画面 ──────────────────────────────
function buildConfirmData() {
  confirmData = files.map((f, i) => {
    const r = results[i];
    if (r?.status !== 'done') return null;
    const inv = r.data;
    return {
      idx: i,
      filename: f.name,
      date: inv.date || '',
      supplier: inv.supplier || '',
      total: inv.total || 0,
      items: inv.items || [],
      splits: [{ store: selectedStore, amount: inv.total || 0 }]
    };
  }).filter(Boolean);
}

function renderConfirm() {
  const container = document.getElementById('resultsArea');

  // エラーがあれば表示
  const errors = files.map((f, i) => ({ f, r: results[i] })).filter(x => x.r?.status === 'error');
  let html = '';
  if (errors.length) {
    errors.forEach(({ f, r }) => {
      html += `<div class="error-row">⚠ ${esc(f.name)}：${esc(r.error)}</div>`;
    });
  }

  if (!confirmData.length) { container.innerHTML = html; return; }

  html += '<div class="results-title">内容を確認してください</div>';

  confirmData.forEach((cd, cidx) => {
    const splitRows = cd.splits.map((sp, sidx) => {
      const canRemove = cd.splits.length > 1;
      const storeOpts = STORES.map(s =>
        `<option value="${s}" ${s === sp.store ? 'selected' : ''}>${s}</option>`
      ).join('');
      return `
        <div class="split-row">
          <div class="split-fields">
            <div class="confirm-row">
              <label class="confirm-label">店舗</label>
              <select class="confirm-field" onchange="updateSplitStore(${cidx},${sidx},this.value)">${storeOpts}</select>
            </div>
            <div class="confirm-row" style="margin-bottom:0">
              <label class="confirm-label">金額</label>
              <input class="confirm-field" type="number" value="${sp.amount}"
                oninput="updateSplitAmount(${cidx},${sidx},this.value)"
                style="text-align:right">
            </div>
          </div>
          ${canRemove ? `<button class="remove-split-btn" onclick="removeSplit(${cidx},${sidx})">×</button>` : ''}
        </div>`;
    }).join('');

    const splitSum = cd.splits.reduce((s, sp) => s + (Number(sp.amount) || 0), 0);
    const splitOk = splitSum === cd.total;
    const splitCheck = cd.splits.length > 1
      ? `<div class="split-check ${splitOk ? 'split-check-ok' : 'split-check-ng'}" id="splitcheck_${cidx}">
          合計 ¥${splitSum.toLocaleString()} / 元の合計 ¥${cd.total.toLocaleString()}${splitOk ? ' ✓' : '　← 金額が合いません'}
        </div>`
      : `<div id="splitcheck_${cidx}"></div>`;

    const itemRows = cd.items.map(it => `
      <tr>
        <td>${esc(it.name)}</td>
        <td class="num">${it.qty}</td>
        <td>${esc(it.unit)}</td>
        <td class="num">¥${(it.amount||0).toLocaleString()}</td>
      </tr>`).join('');

    html += `
      <div class="result-card">
        <div class="result-header">
          <div class="result-header-left">
            <div class="result-filename">${esc(cd.filename)}</div>
          </div>
          <div class="result-total">¥${cd.total.toLocaleString()}</div>
        </div>
        <div class="confirm-body">
          ${splitRows}
          ${splitCheck}
          <button class="add-split-btn" onclick="addSplit(${cidx})">＋ 店舗を分けて入力</button>
          <hr class="split-divider">
          <div class="confirm-row">
            <label class="confirm-label">日付</label>
            <input class="confirm-field" type="date" value="${cd.date}"
              oninput="updateField(${cidx},'date',this.value)">
          </div>
          <div class="confirm-row" style="margin-bottom:0">
            <label class="confirm-label">仕入先</label>
            <input class="confirm-field" type="text" value="${esc(cd.supplier)}"
              oninput="updateField(${cidx},'supplier',this.value)">
          </div>
          ${cd.items.length ? `
          <details style="margin-top:12px">
            <summary class="items-toggle">商品明細を見る（保存されません）</summary>
            <div style="overflow-x:auto;margin-top:8px">
              <table class="result-table">
                <thead><tr><th>商品名</th><th>数量</th><th>単位</th><th>金額</th></tr></thead>
                <tbody>${itemRows}</tbody>
              </table>
            </div>
          </details>` : ''}
        </div>
      </div>`;
  });

  html += `
    <button class="btn btn-green btn-full" onclick="sendToSheets()" style="margin-top:4px">
      スプシに送信
    </button>`;

  container.innerHTML = html;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateField(cidx, field, value) {
  confirmData[cidx][field] = value;
}

function updateSplitStore(cidx, sidx, value) {
  confirmData[cidx].splits[sidx].store = value;
}

function updateSplitAmount(cidx, sidx, value) {
  confirmData[cidx].splits[sidx].amount = Number(value) || 0;
  refreshSplitCheck(cidx);
}

function refreshSplitCheck(cidx) {
  const cd = confirmData[cidx];
  const el = document.getElementById(`splitcheck_${cidx}`);
  if (!el || cd.splits.length <= 1) return;
  const splitSum = cd.splits.reduce((s, sp) => s + (Number(sp.amount) || 0), 0);
  const ok = splitSum === cd.total;
  el.className = `split-check ${ok ? 'split-check-ok' : 'split-check-ng'}`;
  el.textContent = `合計 ¥${splitSum.toLocaleString()} / 元の合計 ¥${cd.total.toLocaleString()}${ok ? ' ✓' : '　← 金額が合いません'}`;
}

function addSplit(cidx) {
  confirmData[cidx].splits.push({ store: selectedStore, amount: 0 });
  renderConfirm();
}

function removeSplit(cidx, sidx) {
  confirmData[cidx].splits.splice(sidx, 1);
  renderConfirm();
}
